<!DOCTYPE html>
<html>
<head>
  <title>Smart Switch Dashboard</title>
  <meta name="viewport" content="width=device-width">
  <style>
    body{font-family:system-ui;background:#1a1a2e;color:white;padding:20px;text-align:center}
    .relay{display:inline-block;width:200px;margin:20px;background:#16213e;padding:20px;border-radius:15px}
    button{width:100%;padding:15px;font-size:18px;border:none;border-radius:10px;cursor:pointer;margin:5px 0}
    .on{background:#4CAF50;color:white}.off{background:#f44336;color:white}
  </style>
</head>
<body>
  <h1>☁️ Cloud Dashboard</h1>
  
  <div id="relays"></div>
  
  <script>
    async function updateUI() {
      const res = await fetch("/api/state");
      const state = await res.json();
      
      let html = "";
      for(let i=1; i<=4; i++) {
        const key = "r"+i;
        const isOn = state[key];
        html += `
          <div class="relay">
            <h2>Relay ${i}</h2>
            <p>${isOn ? "🟢 ON" : "🔴 OFF"}</p>
            <button class="off" onclick="toggle(${i})">${isOn ? "Turn OFF" : "Turn ON"}</button>
          </div>
        `;
      }
      document.getElementById("relays").innerHTML = html;
    }
    
    async function toggle(ch) {
      await fetch(`/api/toggle/${ch}`);
      updateUI();
    }
    
    setInterval(updateUI, 1000);
    updateUI();
  </script>
</body>
</html>
